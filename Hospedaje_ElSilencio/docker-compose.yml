version: '3.8'
services:
  mysql:
    image: mysql:8
    container_name: hotel_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: basereserva
    ports:
      - "3315:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql_data:/var/lib/mysql
volumes:
  mysql_data: